# 与 config.toml 同结构,便于本地/最小化联调(文件名历史遗留;当前服务端仍要求
# 至少配置 IPv4 或 IPv6 网段之一,否则无法启动)。
#
# macOS:TUN 需 device_name = "utun"(勿用 tun0),且创建 TUN 通常要 root/开发者
# 环境授权;无 TUN 时服务端仍会启动,但无虚拟网卡转发。

[server]
# 数据面 WS 只绑回环:客户端经 hy2/REALITY 接入,服务端在本机桥接过来,不直连本端口。
# 需要客户端直接 wss:// 拨这个端口时才改成 ":8080" 并放行防火墙。详见 config.toml 注释。
listen_addr = "127.0.0.1:8080"
jump_host_firewall = false
tls_cert_file = "certs/dev-cert.pem"
tls_key_file = "certs/dev-key.pem"
vpn_websocket_path = "/internal/nanotun/data-plane/ws/v1/REPLACE_WITH_YOUR_RANDOM_TOKEN"
upload_rate = 20971520
download_rate = 20971520

[log]
level = "info"

[tun]
device_name = "tun0"
tcp_connlimit_per_ip = 40
udp_connlimit_per_ip = 60
forward_block_bt = true
forward_block_tracker_6969 = true
forward_block_smtp_25 = true
subnets = ["10.200.0.0/16"]
subnets_v6 = []

[hysteria]
listen_addr = ":443"
tls_cert_file = ""
tls_key_file = ""
password = ""
# obfs_salamander_password = ""   # 启用 hy2 时与 config.toml 一致，须 ≥4 字节
# 其余 QUIC/带宽/udp_relay/masquerade 等同 config.toml [hysteria]

[store]
db_path = "data/nanotun.db"
